# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -sg escape-time 0       # no ESC delay (important for nvim)
set -g focus-events on      # pass focus events to apps (nvim autoread)
set -g mouse on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# No prefix
unbind C-b
set -g prefix None

# ── Pane splits ───────────────────────────────────────────────────────────────
bind -n M-H split-window -h -c "#{pane_current_path}"
bind -n M-V split-window -v -c "#{pane_current_path}"
bind -n M-x kill-pane

# ── Pane navigation (vim-aware via Navigator.nvim) ────────────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"

bind -n M-h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'

# ── Windows ───────────────────────────────────────────────────────────────────
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-n next-window
bind -n M-p previous-window

# ── Status bar (Kanso Ink) ────────────────────────────────────────────────────
set -g status-style "bg=#16161D,fg=#727169"
set -g status-left ""
set -g status-right ""
set -g window-status-current-format "#[fg=#C8C093,bold] #W "
set -g window-status-format "#[fg=#727169] #W "
set -g window-status-separator ""
set -g status-justify centre

set -g pane-border-style "fg=#2D4F67"
set -g pane-active-border-style "fg=#7E9CD8"
