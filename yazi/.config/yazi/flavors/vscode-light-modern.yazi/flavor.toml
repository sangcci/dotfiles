# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
# Use the alternate form for schema definition instead of using "$schema"="URL" due to stricter
# config parsing added in Yazi 26.5.6. Read more: https://github.com/sxyazi/yazi/issues/3938#issuecomment-4389721843
#:schema https://yazi-rs.github.io/schemas/theme.json

# vscode-light-modern
# https://github.com/956MB/vscode.yazi/blob/main/themes/vscode-light-modern/
#
# A theme inspired by Visual Studio Code's Light Modern theme.

[colors]
background = "#FFFFFF"
foreground = "#3B3B3B"
selection = "#ADD6FF"
cursor = "#005FB8"
black = "#000000"
red = "#F85149"
green = "#2EA043"
yellow = "#D7BA7D"
blue = "#005FB8"
magenta = "#AF00DB"
cyan = "#0598BC"
white = "#FFFFFF"
bright_black = "#6E7681"
bright_red = "#F85149"
bright_green = "#2EA043"
bright_yellow = "#D7BA7D"
bright_blue = "#005FB8"
bright_magenta = "#AF00DB"
bright_cyan = "#0598BC"
bright_white = "#FFFFFF"

[mgr]
cwd = { fg = "cyan" }

# Find
find_keyword = { fg = "#795E26", bold = true, italic = true, underline = true }
find_position = { fg = "#AF00DB", bg = "#FFFFFF", bold = true, italic = true }

# Marker
marker_copied = { fg = "#2EA043", bg = "#2EA043" }
marker_cut = { fg = "#F85149", bg = "#F85149" }
marker_marked = { fg = "#0598BC", bg = "#0598BC" }
marker_selected = { fg = "#D7BA7D", bg = "#D7BA7D" }

# Count
count_copied = { fg = "#FFFFFF", bg = "#2EA043" }
count_cut = { fg = "#FFFFFF", bg = "#F85149" }
count_selected = { fg = "#FFFFFF", bg = "#D7BA7D" }

# Border
border_symbol = "│"
border_style = { fg = "#E5E5E5" }


[tabs]
active = { fg = "#3B3B3B", bg = "#FFFFFF" }
inactive = { fg = "#3B3B3B", bg = "#F8F8F8" }


[mode]
normal_main = { fg = "#FFFFFF", bg = "#005FB8", bold = true }
normal_alt = { fg = "#005FB8", bg = "#F8F8F8" }

select_main = { fg = "#FFFFFF", bg = "#FFAF00", bold = true }
select_alt = { fg = "#FFAF00", bg = "#F8F8F8" }

unset_main = { fg = "#FFFFFF", bg = "#F85149", bold = true }
unset_alt = { fg = "#F85149", bg = "#F8F8F8" }


[status]
# Permissions
perm_sep = { fg = "#E5E5E5" }
perm_type = { fg = "#2EA043" }
perm_read = { fg = "#D7BA7D" }
perm_write = { fg = "#F85149" }
perm_exec = { fg = "#0598BC" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#005FB8", bg = "#FFFFFF" }
progress_error = { fg = "#F85149", bg = "#FFFFFF" }


[pick]
border = { fg = "#005FB8" }
active = { fg = "#AF00DB", bold = true }
inactive = {}


[input]
border = { fg = "#005FB8" }
title = {}
value = {}
selected = { reversed = true }


[cmp]
border = { fg = "#005FB8" }


[tasks]
border = { fg = "#005FB8" }
title = {}
hovered = { underline = true }


[which]
mask = { bg = "#FFFFFF" }
cand = { fg = "#0598BC" }
rest = { fg = "#6E7681" }
desc = { fg = "#AF00DB" }
separator = "  "
separator_style = { fg = "#6E7681" }


[help]
on = { fg = "#0598BC" }
run = { fg = "#AF00DB" }
hovered = { bg = "#ADD6FF", bold = true }
footer = { fg = "#3B3B3B", bg = "#F8F8F8" }


[spot]
border = { fg = "#005FB8" }
title = { fg = "#005FB8" }
tbl_col = { fg = "#0598BC" }
tbl_cell = { fg = "#AF00DB", bg = "#F8F8F8" }


[notify]
title_info = { fg = "#2EA043" }
title_warn = { fg = "#D7BA7D" }
title_error = { fg = "#F85149" }


[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "#D7BA7D" },
  # Media
  { mime = "{audio,video}/*", fg = "#AF00DB" },
  # Archives
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#F85149" },
  # Documents
  { mime = "application/{pdf,doc,rtf}", fg = "#0598BC" },
  { mime = "application/vnd.openxmlformats-officedocument.*", fg = "#0598BC" },
  # Virtual file system
  { mime = "vfs/{absent,stale}", fg = "#6E7681" },
  # Fallback
  { url = "*", fg = "#3B3B3B" },
  { url = "*/", fg = "#005FB8" },
]


[icon]
dirs = [
  { name = "Desktop", text = "" },
  { name = "Documents", text = "" },
  { name = "Downloads", text = "" },
  { name = "Pictures", text = "" },
  { name = "Music", text = "" },
  { name = "Videos", text = "" },
  { name = ".git", text = "" },
  { name = ".config", text = "" },
]
conds = [
  # Special files
  { if = "orphan", text = "", fg = "#3B3B3B" },
  { if = "link", text = "", fg = "#0598BC" },
  { if = "block", text = "", fg = "#D7BA7D" },
  { if = "char", text = "", fg = "#D7BA7D" },
  { if = "fifo", text = "", fg = "#D7BA7D" },
  { if = "sock", text = "", fg = "#D7BA7D" },
  { if = "dummy", text = "", fg = "#F85149" },

  # Fallback
  { if = "dir & hovered", text = "", fg = "#005FB8" },
  { if = "dir", text = "", fg = "#005FB8" },
  { if = "exec", text = "", fg = "#2EA043" },
  { if = "!dir", text = "", fg = "#3B3B3B" },
]
